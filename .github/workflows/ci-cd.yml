name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Android CI
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Validate unit tests
        run: ./gradlew test --no-daemon

      - name: Run lint checks
        run: ./gradlew lintDebug --no-daemon

      - name: Compile UI instrumentation sources
        run: ./gradlew :app:compileDebugAndroidTestKotlin --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cyxwatch-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: cyxwatch-release-unsigned-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Release APK
    if: startsWith(github.ref, 'refs/tags/')
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Rebuild release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Collect release artifact
        run: |
          mkdir -p .artifacts
          cp app/build/outputs/apk/release/app-release-unsigned.apk .artifacts/cyxwatch-${{ github.ref_name }}-release-unsigned.apk

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: CyxWatch ${{ github.ref_name }}
          files: .artifacts/cyxwatch-${{ github.ref_name }}-release-unsigned.apk
          generate_release_notes: true
