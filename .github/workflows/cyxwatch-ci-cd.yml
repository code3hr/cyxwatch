name: CyxWatch CI/CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (e.g. 0.0.1)"
        required: true
        default: "0.0.1"
      pre_release:
        description: "Mark release as pre-release"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  actions: read

jobs:
  ci:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon
      - name: Run lint
        run: ./gradlew :app:lintDebug --no-daemon
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

  release:
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Resolve release version
        id: release_meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.release_version }}"
            if [[ ! "${VERSION}" =~ ^v ]]; then
              VERSION="v${VERSION}"
            fi
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Run tests before release
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleRelease --no-daemon
      - name: Prepare release artifact
        run: |
          mkdir -p release-artifacts
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp app/build/outputs/apk/release/app-release-unsigned.apk release-artifacts/cyxwatch-${{ steps.release_meta.outputs.version }}-release-unsigned.apk
          elif [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk release-artifacts/cyxwatch-${{ steps.release_meta.outputs.version }}-release.apk
          elif [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/cyxwatch-${{ steps.release_meta.outputs.version }}-beta.apk
          else
            echo "No APK artifact found."
            exit 1
          fi
      - name: Build summary
        run: |
          echo "tag=${{ steps.release_meta.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "artifact=release-artifacts/" >> "$GITHUB_STEP_SUMMARY"
      - name: Create GitHub release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.version }}
          name: "CyxWatch ${{ steps.release_meta.outputs.version }} (beta)"
          prerelease: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.pre_release == 'true' }}
          generate_release_notes: true
          files: release-artifacts/*
